<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            background-color: blue; /* Imposta il colore di sfondo del body su blu */
            color: white; /* Imposta il colore del testo su bianco per una migliore leggibilità */
            text-align: center; /* Centra il testo all'interno del body */
        }

        form {
            margin-top: 20px; /* Aggiunge uno spazio sopra il form */
        }
    </style>
</head>
<body>

    <h1>Benvenuto nella mia pagina!</h1> 
    <h2>Login</h2>
        
    <form action="/login" method="post">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br>
        <input type="submit" value="Login">
    </form>
    
</body>
</html>
